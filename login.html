<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Modal</title>
    <!-- Link to your CSS -->
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- Login Modal -->
    <div id="login-modal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeLoginModal()">&times;</span>
        <!-- Login Form -->
        <div id="login-form" style="display: block">
          <h2>Login</h2>
          <form onsubmit="handleLogin(event)">
            <label for="login-username">Username/Email</label>
            <input type="text" id="login-username" required />

            <label for="login-password">Password</label>
            <input type="password" id="login-password" required />

            <button type="submit">Login</button>
            <p style="text-align: center; margin-top: 10px">
              <a href="#" onclick="showRegistrationForm()">Register</a> |
              <a href="#" onclick="showForgotPasswordForm()"
                >Forgot Password?</a
              >
            </p>
          </form>
        </div>

        <!-- Registration Form (Hidden by default) -->
        <div id="registration-form" style="display: none">
          <h2>Register</h2>
          <form onsubmit="handleRegistration(event)">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" required />

            <label for="register-email">Email</label>
            <input type="email" id="register-email" required />

            <label for="register-password">Password</label>
            <input type="password" id="register-password" required />

            <button type="submit">Register</button>
            <p style="text-align: center; margin-top: 10px">
              <a href="#" onclick="showLoginForm()"
                >Already have an account? Login</a
              >
            </p>
          </form>
        </div>

        <!-- Forgot Password Form (Hidden by default) -->
        <div id="forgot-password-form" style="display: none">
          <h2>Forgot Password</h2>
          <form onsubmit="handleForgotPassword(event)">
            <label for="forgot-username">Email or Phone Number</label>
            <input
              type="text"
              id="forgot-username"
              placeholder="Enter your email or phone number"
              required
            />

            <button type="submit">Submit</button>
            <p style="text-align: center; margin-top: 10px">
              <a href="#" onclick="showLoginForm()">Back to Login</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
